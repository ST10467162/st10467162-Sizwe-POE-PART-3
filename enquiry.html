<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit a service enquiry to QuickFix Connect for plumbing, electrical, cleaning, appliance repair, home maintenance and garden services.">
    <meta name="keywords" content="QuickFix Connect enquiry, service booking, plumbing enquiry, electrical enquiry, cleaning enquiry">
    <meta name="author" content="Sizwe Myeza">

    <title>Enquiry - QuickFix Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <img src="https://img.icons8.com/ios-filled/100/maintenance.png" alt="QuickFix Connect maintenance logo">
        <div>
            <h1>QuickFix Connect</h1>
            <p>Connect • Fix • Simplify</p>
        </div>
    </div>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="location.html">Locations</a>
        <a href="contact.html">Contact</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>
</header>

<main class="container">

    <h1>Service Enquiry</h1>

    <p>
        Use this form to request more information about a service or to make a booking enquiry.
    </p>

    <section class="cta">
        <form id="enquiryForm" class="contact-form">

            <label for="enquiryName">Full Name</label>
            <input id="enquiryName" type="text" placeholder="Enter your full name" required>

            <label for="enquiryEmail">Email</label>
            <input id="enquiryEmail" type="email" placeholder="Enter your email address" required>

            <label for="enquiryPhone">Phone Number</label>
            <input id="enquiryPhone" type="tel" placeholder="Example: 0658699206" required>

            <label for="serviceType">Service Needed</label>
            <select id="serviceType" required>
                <option value="">Select a service</option>
                <option value="Plumbing">Plumbing</option>
                <option value="Electrical Services">Electrical Services</option>
                <option value="Cleaning Services">Cleaning Services</option>
                <option value="Appliance Repairs">Appliance Repairs</option>
                <option value="Home Maintenance">Home Maintenance</option>
                <option value="Garden Services">Garden Services</option>
            </select>

            <label for="preferredDate">Preferred Date</label>
            <input id="preferredDate" type="date" required>

            <label for="urgency">Urgency Level</label>
            <select id="urgency" required>
                <option value="">Select urgency</option>
                <option value="Low">Low - I am flexible</option>
                <option value="Medium">Medium - Within a few days</option>
                <option value="High">High - As soon as possible</option>
            </select>

            <label for="enquiryMessage">Describe the Problem</label>
            <textarea id="enquiryMessage" rows="5" placeholder="Explain what service you need..." required></textarea>

            <p id="enquiryError" class="error-message"></p>

            <button type="submit" class="btn">Submit Enquiry</button>

        </form>
    </section>

</main>

<footer class="footer">
    <p>© 2026 QuickFix Connect</p>
</footer>

<script src="javascript/script.js"></script>

</body>
</html>
